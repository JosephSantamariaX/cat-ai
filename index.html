<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gato</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Cpath d='M18 18h28M18 32h28M18 46h28M18 18v28M32 18v28M46 18v28' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game" aria-label="Juego de gato">
      <section class="topbar">
        <div>
          <p class="eyebrow">Gato</p>
          <h1>Turno de <span id="current-player">X</span></h1>
        </div>
        <button id="reset" type="button">Reiniciar</button>
      </section>

      <section class="board" id="board" aria-label="Tablero">
        <button class="cell" type="button" data-index="0" aria-label="Casilla 1"></button>
        <button class="cell" type="button" data-index="1" aria-label="Casilla 2"></button>
        <button class="cell" type="button" data-index="2" aria-label="Casilla 3"></button>
        <button class="cell" type="button" data-index="3" aria-label="Casilla 4"></button>
        <button class="cell" type="button" data-index="4" aria-label="Casilla 5"></button>
        <button class="cell" type="button" data-index="5" aria-label="Casilla 6"></button>
        <button class="cell" type="button" data-index="6" aria-label="Casilla 7"></button>
        <button class="cell" type="button" data-index="7" aria-label="Casilla 8"></button>
        <button class="cell" type="button" data-index="8" aria-label="Casilla 9"></button>
      </section>

      <p class="status" id="status" aria-live="polite">Juegan X y O</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
